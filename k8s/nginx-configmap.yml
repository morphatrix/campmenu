# nginx server block for the frontend, mounted into the official nginx image
# (so no custom frontend image is built). Mirrors frontend/nginx.conf.
apiVersion: v1
kind: ConfigMap
metadata:
  name: campmenu-nginx
  namespace: campmenu
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      server_tokens off;
      root /usr/share/nginx/html;
      index index.html;

      gzip on;
      gzip_types text/css application/javascript application/json image/svg+xml;
      gzip_min_length 1024;

      # Security headers (inherited by every location below, which declare no
      # add_header of their own). index.html is revalidated via ETag.
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

      location /assets/ {
        expires 1y;
      }

      # PWA manifest served with the right content type.
      location = /manifest.webmanifest {
        default_type application/manifest+json;
      }

      # Proxy the API to the backend service so the SPA works same-origin
      # whether reached via the ingress or a direct port-forward to this pod.
      location /api/ {
        proxy_pass http://campmenu-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow Server-Sent Events (/api/stream) to stream without buffering.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
