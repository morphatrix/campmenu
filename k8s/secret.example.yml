# Copy this file to secret.yml and fill every value. secret.yml is gitignored —
# NEVER commit real secrets. Generate JWT_SECRET with: openssl rand -base64 48
apiVersion: v1
kind: Secret
metadata:
  name: campmenu-secrets
  namespace: campmenu
type: Opaque
stringData:
  JWT_SECRET: "CHANGE_ME_random_string_min_32_chars"
  # Encrypts sensitive settings at rest (SMTP password, external DB DSN).
  # Leave empty to keep them plaintext. Generate with: openssl rand -base64 32
  SETTINGS_ENC_KEY: ""
  BOOTSTRAP_ADMIN_EMAIL: "admin@example.com"
  BOOTSTRAP_ADMIN_PASSWORD: "CHANGE_ME_strong_password"
  # First name of the initial admin account (optional, defaults to "Admin").
  BOOTSTRAP_ADMIN_NAME: "Admin"
  # SMTP (leave SMTP_HOST empty to disable email; links are logged instead).
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: "no-reply@campmenu.local"
  # Credentials to clone the repo at pod startup (used by the clone
  # initContainers). For a PUBLIC repo, leave both empty (anonymous clone).
  # For a private repo, use a read-only access token.
  GIT_USERNAME: ""
  GIT_TOKEN: ""
