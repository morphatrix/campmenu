server {
  listen 8080;
  server_name _;
  server_tokens off;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Security headers (inherited by the locations below). No strict CSP here
  # because in Docker Compose the API is a separate origin; the production
  # Content-Security-Policy is set in k8s/nginx-configmap.yml (same-origin).
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Hashed assets are long-cached; index.html is revalidated via ETag.
  location /assets/ {
    expires 1y;
  }

  # PWA manifest served with the right content type.
  location = /manifest.webmanifest {
    default_type application/manifest+json;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
